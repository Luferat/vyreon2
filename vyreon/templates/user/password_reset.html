{% extends '_base.html' %}
{% load widget_tweaks %}
{% block maincontent %}

<h2>Recuperar Senha</h2>
<p>Preencha a solicitação abaixo par redefinir sua senha.</p>

<div class="card my-4" style="max-width: 500px; margin: auto;">
    <div class="card-header"><strong>Recuperar senha</strong></div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">E-mail cadastrado:</label>
                {% render_field form.email class="form-control" type="email" %}
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar link</button>
        </form>
    </div>
    <div class="card-footer d-grid d-flex justify-content-between">
        <a href="{% url 'login' %}">Entrar / Login</a>
        <a href="{% url 'register' %}">Cadastre-se</a>
    </div>
</div>
{% endblock %}
